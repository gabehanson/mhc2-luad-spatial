# paths_config.yml
# ---------------------------------------------------------------
# Central configuration for all external data locations.
# This file is committed to the repo — actual data is NOT.
#
# HOW TO USE:
#   from pathlib import Path
#   import yaml
#   with open("paths_config.yml") as f:
#       cfg = yaml.safe_load(f)
#
# For reviewers / collaborators:
#   Update repo_root and data paths below to match your machine.
# ---------------------------------------------------------------

